<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diário de Classe Digital - SESI</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 1000px; }
        h2, h3 { color: #333; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
        .section { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #dee2e6; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; flex: 1; box-sizing: border-box; }
        button { padding: 10px 15px; background-color: #0056b3; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #004494; }
        .btn-success { background-color: #28a745; width: 100%; font-size: 16px; padding: 12px; margin-top: 10px; }
        .btn-success:hover { background-color: #218838; }
        .btn-add { background-color: #6c757d; }
        .btn-danger { background-color: #dc3545; padding: 5px 10px; font-size: 14px;}
        .btn-danger:hover { background-color: #c82333; }
        .btn-pdf { background-color: #ff9800; color: #fff; width: 100%; font-size: 16px; padding: 12px; margin-top: 10px; }
        .btn-pdf:hover { background-color: #e68a00; }
        .hidden { display: none !important; }
        
        .tabs-container { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; background: #e9ecef; padding: 10px; border-radius: 8px; }
        .tab-button { background-color: #ccc; color: #333; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .tab-button.active { background-color: #0056b3; color: white; }
        .tab-button:hover:not(.active) { background-color: #bbb; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: center; }
        th { background-color: #e9ecef; color: #333; }
        td input { width: 70px; text-align: center; border: 1px solid #aaa; font-weight: bold; }
        .nome-aluno { width: 250px; text-align: left; }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-weight: bold; font-size: 13px; }
        .approved { background-color: #d4edda; color: #155724; }
        .reproved { background-color: #f8d7da; color: #721c24; }
        .warning { color: #856404; background-color: #fff3cd; padding: 10px; border-radius: 5px; text-align: center; margin-bottom: 15px; font-weight: bold; }
        .info-msg { text-align: center; color: #666; font-style: italic; padding: 20px; }
        .btn-icon { background-color: transparent; border: none; cursor: pointer; font-size: 18px; padding: 0; color: #dc3545; }
        .btn-icon:hover { color: #a71d2a; background-color: transparent; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 30px; border-radius: 10px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .close-btn { position: absolute; top: 15px; right: 15px; background: #dc3545; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-weight: bold; padding: 0; display: flex; justify-content: center; align-items: center; transition: 0.3s;}
        .close-btn:hover { background: #c82333; }
        
        .boletim-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .boletim-table th, .boletim-table td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .boletim-table th { background: #0056b3; color: white; text-align: center; }
        .boletim-header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #0056b3; padding-bottom: 10px; }

        .modo-impressao .esconder-no-pdf { display: none !important; }
        .modo-impressao { padding: 0; background: white; }
        .modo-impressao .container { box-shadow: none; max-width: none; padding: 0; }
        .modo-impressao td input { border: none; background: transparent; font-weight: bold; font-size: 14px; padding: 0; width: 100%; }
        .modo-impressao .section { border: none; padding: 0; margin-bottom: 10px; }
        .modo-impressao .area-cabecalho { margin-bottom: 30px; }

        #statusNuvem { font-size: 14px; font-weight: bold; padding: 5px 10px; border-radius: 20px; margin-left: 15px; transition: 0.3s; }
        .status-salvo { color: #155724; background-color: #d4edda; }
        .status-salvando { color: #856404; background-color: #fff3cd; }
    </style>
</head>
<body>

    <div class="container" id="conteudoPrincipal">
        <h2 class="esconder-no-pdf">Painel do Professor</h2>
        <div class="subtitle esconder-no-pdf">Gerencie turmas, áreas do conhecimento e notas independentes</div>

        <div class="row esconder-no-pdf" style="background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #dee2e6;">
            <input type="text" id="inputNovaTurma" placeholder="Nome da nova turma (Ex: 1º Ano A)">
            <button class="btn-success" style="width: auto; margin: 0;" onclick="criarTurma()">+ Criar Turma</button>
        </div>

        <div id="listaAbasTurmas" class="tabs-container hidden esconder-no-pdf"></div>

        <div id="mensagemInicial" class="info-msg">
            Carregando seus dados do banco... Aguarde um momento.
        </div>

        <div id="areaTurma" class="hidden">
            
            <div class="area-cabecalho" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div style="display: flex; align-items: center;">
                    <h3 style="color: #0056b3; font-size: 24px; margin: 0;">
                        Turma: <span id="tituloTurmaAtiva"></span> 
                        <span id="tituloAreaAtiva" style="color: #666; font-size: 20px;"></span>
                    </h3>
                    <span id="statusNuvem" class="status-salvo esconder-no-pdf">☁️ Salvo</span>
                </div>
                <button class="btn-danger esconder-no-pdf" onclick="excluirTurmaAtual()">🗑️ Excluir Turma do Banco</button>
            </div>

            <div class="row esconder-no-pdf" style="background: #e9ecef; padding: 10px 15px; border-radius: 5px; margin-bottom: 20px;">
                <label for="seletorArea" style="font-weight: bold; font-size: 16px; margin-right: 10px; color: #333;">Área da Disciplina:</label>
                <select id="seletorArea" onchange="mudarArea()" style="font-weight: bold; font-size: 16px; color: #0056b3; flex: 1;">
                    </select>
                <button class="btn-success" style="width: auto; margin: 0 5px; background-color: #17a2b8;" onclick="adicionarNovaArea()" title="Criar uma nova disciplina do zero">+ Nova Disciplina</button>
                <button class="btn-danger" style="width: auto; margin: 0;" onclick="excluirAreaAtual()" title="Excluir a disciplina selecionada">🗑️</button>
            </div>

            <div class="section esconder-no-pdf">
                <h3>1. Composição da Nota da Área (Total: 100%)</h3>
                <div id="alertaPesos" class="warning hidden">A soma das atividades precisa ser exatamente 100%.</div>
                <div id="listaAtividades"></div> 
                <div class="row" style="margin-top: 15px; background: #fff; padding: 15px; border-radius: 5px; border: 1px dashed #ccc;">
                    <input type="text" id="novaAtivNome" placeholder="Nova Atividade (Ex: Prova Escrita)">
                    <input type="number" id="novaAtivPeso" placeholder="Peso %" style="flex: 0.3;">
                    <button class="btn-add" id="btnAdicionarAtiv" onclick="adicionarAtividade()">+ Adicionar Atividade</button>
                </div>
                <div style="text-align: right; font-weight: bold; margin-top: 10px; font-size: 18px;">
                    Total Distribuído: <span id="somaTotalPesos">0</span>%
                </div>
            </div>

            <div class="section" id="areaDiarioPDF">
                <h3>Diário de Notas</h3>
                <div class="row esconder-no-pdf" id="linhaNovoAluno" style="margin-bottom: 20px;">
                    <input type="text" id="novoAlunoNome" placeholder="Nome do Aluno">
                    <button class="btn-add" onclick="adicionarAluno()">+ Adicionar Aluno na Turma</button>
                </div>
                <div style="overflow-x: auto;">
                    <table id="tabelaDiario">
                        <thead><tr id="cabecalhoTabela"></tr></thead>
                        <tbody id="corpoTabela"></tbody>
                    </table>
                </div>
            </div>

            <div class="esconder-no-pdf">
                <button class="btn-pdf" onclick="gerarPDFDiario()">📄 Gerar PDF do Diário desta Disciplina</button>
            </div>
        </div>
    </div>

    <div id="modalBoletim" class="modal-overlay hidden">
        <div class="modal-content">
            <button class="close-btn" title="Fechar" onclick="fecharBoletim()">X</button>
            <div id="areaImpressaoBoletim"></div>
            <button class="btn-pdf" id="btnBaixarBoletim" onclick="gerarPDFBoletim()" style="margin-top: 20px; background-color: #28a745;">📄 Baixar Boletim em PDF</button>
        </div>
    </div>

    <div id="containerBoletimPDF" class="hidden" style="background: white; padding: 40px; color: black; max-width: 800px; margin: 0 auto;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        // Importamos o deleteField para poder deletar disciplinas completas cirurgicamente
        import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, updateDoc, deleteField } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAROw7eYbAM7H6V0j83wXPkU5sM-X3FD0s",
            authDomain: "notassmedio.firebaseapp.com",
            databaseURL: "https://notassmedio-default-rtdb.firebaseio.com",
            projectId: "notassmedio",
            storageBucket: "notassmedio.firebasestorage.app",
            messagingSenderId: "846891539181",
            appId: "1:846891539181:web:4b96ff84b13b8045b28ae4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let turmas = []; 
        let indiceTurmaAtiva = -1;
        let areaAtiva = ""; 
        let timerAutoSaveEstrutura = null;
        let alunoAtualBoletim = "";

        // Disciplinas iniciais apenas para turmas NOVAS. Depois o professor apaga ou cria livremente.
        const LISTA_AREAS_PADRAO = ["Ciências Humanas", "Ciências da Natureza", "Matemática", "Linguagens", "Robótica", "Aprofundamento", "Projeto de Vida"];

        // --- 1. SALVAMENTO CIRÚRGICO DA ESTRUTURA (Blindado) ---
        function acionarAutoSaveEstrutura() {
            const statusVisual = document.getElementById('statusNuvem');
            statusVisual.innerText = "⏳ Salvando Dados...";
            statusVisual.className = "status-salvando esconder-no-pdf";

            clearTimeout(timerAutoSaveEstrutura);
            
            timerAutoSaveEstrutura = setTimeout(async () => {
                if(indiceTurmaAtiva === -1) return;
                const turma = turmas[indiceTurmaAtiva];
                
                try {
                    const idParaSalvar = turma.firebaseId || turma.nome;
                    
                    let pacotesDeAtualizacao = {
                        "alunos": turma.alunos,
                        "dataUltimaAtualizacao": new Date().toLocaleString('pt-BR')
                    };

                    Object.keys(turma.areas).forEach(a => {
                        pacotesDeAtualizacao[`areas.${a}.atividades`] = turma.areas[a].atividades;
                    });
                    
                    await updateDoc(doc(db, "diarios_turmas", idParaSalvar), pacotesDeAtualizacao);
                    
                    statusVisual.innerText = "☁️ Salvo";
                    statusVisual.className = "status-salvo esconder-no-pdf";
                } catch (error) {
                    statusVisual.innerText = "❌ Erro ao Salvar";
                    statusVisual.className = "status-salvando esconder-no-pdf";
                    console.error("Erro na Estrutura:", error);
                }
            }, 1000);
        }

        async function carregarDadosDoBanco() {
            try {
                const querySnapshot = await getDocs(collection(db, "diarios_turmas"));
                turmas = []; 
                querySnapshot.forEach((documento) => {
                    const dados = documento.data();
                    
                    let areasDoBanco = dados.areas;
                    if (!areasDoBanco) {
                        areasDoBanco = {};
                        LISTA_AREAS_PADRAO.forEach(a => areasDoBanco[a] = { atividades: [], notas: {} });
                        
                        if (dados.atividadesDefinidas) {
                            areasDoBanco["Ciências Humanas"].atividades = dados.atividadesDefinidas;
                            if (dados.alunos) {
                                dados.alunos.forEach(al => {
                                    areasDoBanco["Ciências Humanas"].notas[al.id || Date.now().toString()] = al.notas || {};
                                });
                            }
                        }
                    }

                    Object.keys(areasDoBanco).forEach(a => {
                        if (!areasDoBanco[a]) areasDoBanco[a] = { atividades: [], notas: {} };
                        if (!areasDoBanco[a].notas) areasDoBanco[a].notas = {};
                        if (!areasDoBanco[a].atividades) areasDoBanco[a].atividades = [];
                    });

                    let alunosTratados = (dados.alunos || []).map(al => {
                        return { id: al.id ? al.id.toString() : Date.now().toString() + Math.random().toString().substr(2,5), nome: al.nome };
                    });

                    turmas.push({
                        firebaseId: documento.id,
                        id: Date.now() + Math.random(),
                        nome: dados.turma,
                        alunos: alunosTratados,
                        areas: areasDoBanco
                    });
                });

                const msgInicial = document.getElementById('mensagemInicial');
                if (turmas.length > 0) {
                    msgInicial.classList.add('hidden');
                    document.getElementById('listaAbasTurmas').classList.remove('hidden');
                    renderizarAbas();
                    selecionarTurma(0); 
                } else {
                    msgInicial.innerText = "Nenhuma turma salva encontrada. Crie uma turma acima para começar.";
                }
            } catch (error) {
                document.getElementById('mensagemInicial').innerText = "Erro ao conectar com o banco de dados.";
            }
        }

        carregarDadosDoBanco();

        // --- SISTEMA DE DISCIPLINAS DINÂMICAS ---
        function renderizarSeletorAreas() {
            const seletor = document.getElementById('seletorArea');
            seletor.innerHTML = '';
            const turma = turmas[indiceTurmaAtiva];
            const areas = Object.keys(turma.areas);

            if (areas.length === 0) {
                seletor.innerHTML = '<option value="">(Nenhuma disciplina cadastrada)</option>';
                areaAtiva = "";
                document.getElementById('tituloAreaAtiva').innerText = " - Sem Disciplinas";
                return;
            }

            if (!areas.includes(areaAtiva)) {
                areaAtiva = areas[0];
            }

            areas.forEach(a => {
                const option = document.createElement('option');
                option.value = a;
                option.innerText = a;
                if (a === areaAtiva) option.selected = true;
                seletor.appendChild(option);
            });

            document.getElementById('tituloAreaAtiva').innerText = " - " + areaAtiva;
        }

        window.mudarArea = () => {
            areaAtiva = document.getElementById('seletorArea').value;
            document.getElementById('tituloAreaAtiva').innerText = " - " + areaAtiva;
            renderizarAtividades();
            renderizarDiario();
        };

        window.adicionarNovaArea = () => {
            const nomeNovaArea = prompt("Digite o nome da nova Disciplina/Área (Ex: Aprofundamento de Matemática):");
            if (!nomeNovaArea || nomeNovaArea.trim() === "") return;
            
            const nomeTrim = nomeNovaArea.trim();
            const turma = turmas[indiceTurmaAtiva];

            if (turma.areas[nomeTrim]) {
                alert("Já existe uma disciplina com este nome nesta turma.");
                return;
            }

            turma.areas[nomeTrim] = { atividades: [], notas: {} };
            areaAtiva = nomeTrim;
            
            renderizarSeletorAreas();
            renderizarAtividades();
            renderizarDiario();
            acionarAutoSaveEstrutura(); 
        };

        window.excluirAreaAtual = async () => {
            if(!areaAtiva) return;
            const turma = turmas[indiceTurmaAtiva];
            const areaParaExcluir = areaAtiva;

            if(confirm(`Tem certeza absoluta que deseja excluir a disciplina '${areaParaExcluir}'? Todas as notas e atividades dela serão perdidas!`)) {
                
                // Exclui localmente
                delete turma.areas[areaParaExcluir];
                renderizarSeletorAreas();
                renderizarAtividades();
                renderizarDiario();

                // Exclui cirurgicamente no banco de dados usando o 'deleteField' do Firebase
                try {
                    const statusVisual = document.getElementById('statusNuvem');
                    statusVisual.innerText = "⏳ Excluindo Disciplina...";
                    statusVisual.className = "status-salvando esconder-no-pdf";

                    const idParaSalvar = turma.firebaseId || turma.nome;
                    await updateDoc(doc(db, "diarios_turmas", idParaSalvar), {
                        [`areas.${areaParaExcluir}`]: deleteField(),
                        "dataUltimaAtualizacao": new Date().toLocaleString('pt-BR')
                    });

                    statusVisual.innerText = "☁️ Salvo";
                    statusVisual.className = "status-salvo esconder-no-pdf";
                } catch(e) {
                    console.error("Erro ao excluir disciplina:", e);
                }
            }
        };

        window.criarTurma = async () => {
            const nomeInput = document.getElementById('inputNovaTurma');
            const nome = nomeInput.value.trim();

            if (!nome) { alert("Digite um nome para a turma."); return; }
            const turmaExiste = turmas.find(t => t.nome.toLowerCase() === nome.toLowerCase());
            if (turmaExiste) { alert("Já existe uma turma com este nome."); return; }

            let objAreas = {};
            LISTA_AREAS_PADRAO.forEach(a => objAreas[a] = { atividades: [], notas: {} });

            turmas.push({ 
                id: Date.now().toString(), 
                nome: nome, 
                alunos: [], 
                areas: objAreas 
            });
            
            nomeInput.value = '';
            const indexAtiva = turmas.length - 1;
            selecionarTurma(indexAtiva);
            
            try {
                document.getElementById('statusNuvem').innerText = "⏳ Criando...";
                const docData = {
                    turma: nome,
                    alunos: [],
                    areas: objAreas,
                    dataUltimaAtualizacao: new Date().toLocaleString('pt-BR')
                };
                await setDoc(doc(db, "diarios_turmas", nome), docData);
                turmas[indexAtiva].firebaseId = nome;
                document.getElementById('statusNuvem').innerText = "☁️ Salvo";
            } catch(e) {
                console.error("Erro ao criar turma", e);
            }
        };

        window.selecionarTurma = (index) => {
            indiceTurmaAtiva = index;
            document.getElementById('mensagemInicial').classList.add('hidden');
            document.getElementById('listaAbasTurmas').classList.remove('hidden');
            document.getElementById('areaTurma').classList.remove('hidden');
            
            document.getElementById('tituloTurmaAtiva').innerText = turmas[indiceTurmaAtiva].nome;
            
            renderizarSeletorAreas();
            
            document.getElementById('statusNuvem').innerText = "☁️ Salvo";
            document.getElementById('statusNuvem').className = "status-salvo esconder-no-pdf";

            renderizarAbas();
            renderizarAtividades();
            renderizarDiario();
        };

        window.excluirTurmaAtual = async () => {
            const turmaSelecionada = turmas[indiceTurmaAtiva];
            if(confirm(`Tem certeza que deseja excluir a turma '${turmaSelecionada.nome}' permanentemente do Banco de Dados?`)) {
                try {
                    const idParaDeletar = turmaSelecionada.firebaseId || turmaSelecionada.nome;
                    await deleteDoc(doc(db, "diarios_turmas", idParaDeletar));
                    
                    turmas.splice(indiceTurmaAtiva, 1);
                    if (turmas.length > 0) {
                        selecionarTurma(0);
                    } else {
                        indiceTurmaAtiva = -1;
                        document.getElementById('areaTurma').classList.add('hidden');
                        document.getElementById('listaAbasTurmas').classList.add('hidden');
                        document.getElementById('mensagemInicial').innerText = "Nenhuma turma salva encontrada. Crie uma turma acima para começar.";
                        document.getElementById('mensagemInicial').classList.remove('hidden');
                    }
                    renderizarAbas();
                } catch(error) {
                    alert("Erro ao tentar excluir a turma no banco: " + error.message);
                }
            }
        };

        function renderizarAbas() {
            const container = document.getElementById('listaAbasTurmas');
            container.innerHTML = '';
            turmas.forEach((turma, index) => {
                const isActive = index === indiceTurmaAtiva ? 'active' : '';
                container.innerHTML += `<button class="tab-button ${isActive}" onclick="selecionarTurma(${index})">${turma.nome}</button>`;
            });
        }

        window.adicionarAtividade = () => {
            if(!areaAtiva) { alert("Crie uma disciplina primeiro."); return; }
            const nome = document.getElementById('novaAtivNome').value;
            const peso = parseFloat(document.getElementById('novaAtivPeso').value);
            if (!nome || !peso || peso <= 0) { alert("Preencha o nome da atividade e um peso válido."); return; }

            const area = turmas[indiceTurmaAtiva].areas[areaAtiva];
            area.atividades.push({ id: Date.now().toString(), nome: nome, peso: peso });
            
            document.getElementById('novaAtivNome').value = '';
            document.getElementById('novaAtivPeso').value = '';
            
            renderizarAtividades();
            renderizarDiario();
            acionarAutoSaveEstrutura(); 
        };

        window.removerAtividade = (idAtiv) => {
            const area = turmas[indiceTurmaAtiva].areas[areaAtiva];
            area.atividades = area.atividades.filter(a => a.id !== idAtiv);
            renderizarAtividades();
            renderizarDiario();
            acionarAutoSaveEstrutura(); 
        };

        function renderizarAtividades() {
            const divLista = document.getElementById('listaAtividades');
            if (!areaAtiva || !turmas[indiceTurmaAtiva].areas[areaAtiva]) {
                divLista.innerHTML = `<p style="color:#666; font-size:14px;">Selecione ou crie uma disciplina.</p>`;
                document.getElementById('somaTotalPesos').innerText = "0";
                document.getElementById('btnAdicionarAtiv').disabled = true;
                return;
            }
            document.getElementById('btnAdicionarAtiv').disabled = false;

            const area = turmas[indiceTurmaAtiva].areas[areaAtiva];
            divLista.innerHTML = '';
            let soma = 0;

            if (area.atividades.length === 0) divLista.innerHTML = `<p style="color:#666; font-size:14px;">Nenhuma atividade cadastrada em <strong>${areaAtiva}</strong>.</p>`;

            area.atividades.forEach(ativ => {
                soma += ativ.peso;
                divLista.innerHTML += `
                    <div class="row" style="background: #fff; padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
                        <span style="flex: 1;"><strong>${ativ.nome}</strong> (Peso: ${ativ.peso}%)</span>
                        <button class="btn-danger" style="width: auto; margin:0;" onclick="removerAtividade('${ativ.id}')">Excluir</button>
                    </div>`;
            });

            document.getElementById('somaTotalPesos').innerText = soma;
            const alerta = document.getElementById('alertaPesos');
            if (soma !== 100 && area.atividades.length > 0) alerta.classList.remove('hidden');
            else alerta.classList.add('hidden');
        }

        window.adicionarAluno = () => {
            const nomeAluno = document.getElementById('novoAlunoNome').value;
            if (!nomeAluno) return;
            const turma = turmas[indiceTurmaAtiva];
            
            turma.alunos.push({ id: Date.now().toString(), nome: nomeAluno });
            
            document.getElementById('novoAlunoNome').value = '';
            renderizarDiario();
            acionarAutoSaveEstrutura(); 
        };

        window.excluirAluno = (indexAluno) => {
            const turma = turmas[indiceTurmaAtiva];
            const alunoId = turma.alunos[indexAluno].id;
            
            if(confirm(`Remover o aluno(a) ${turma.alunos[indexAluno].nome} desta turma? Ele será apagado de TODAS as disciplinas.`)) {
                turma.alunos.splice(indexAluno, 1);
                
                Object.values(turma.areas).forEach(area => {
                    if(area.notas[alunoId]) delete area.notas[alunoId];
                });
                
                renderizarDiario();
                acionarAutoSaveEstrutura(); 
            }
        };

        function renderizarDiario() {
            const tbody = document.getElementById('corpoTabela');
            const trCabecalho = document.getElementById('cabecalhoTabela');
            
            if (!areaAtiva || !turmas[indiceTurmaAtiva].areas[areaAtiva]) {
                trCabecalho.innerHTML = '<th class="nome-aluno">Nome do Aluno</th><th>Info</th>';
                tbody.innerHTML = `<tr><td colspan="2" style="padding:20px; color:#666;">Crie uma disciplina para gerenciar o diário.</td></tr>`;
                return;
            }

            const turma = turmas[indiceTurmaAtiva];
            const area = turma.areas[areaAtiva];
            
            trCabecalho.innerHTML = '<th class="nome-aluno">Nome do Aluno</th>';
            area.atividades.forEach(ativ => { trCabecalho.innerHTML += `<th>${ativ.nome}<br><small>(${ativ.peso}%)</small></th>`; });
            trCabecalho.innerHTML += '<th>Média Final</th><th>Situação</th><th class="esconder-no-pdf">Ações</th>';

            tbody.innerHTML = '';
            if (turma.alunos.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${area.atividades.length + 4}" style="padding:20px; color:#666;">Nenhum aluno na turma.</td></tr>`;
                return;
            }

            turma.alunos.forEach((aluno, indexAluno) => {
                let linha = `<tr><td class="nome-aluno">${aluno.nome}</td>`;
                
                area.atividades.forEach(ativ => {
                    let notaValue = (area.notas[aluno.id] && area.notas[aluno.id][ativ.id]) !== undefined ? area.notas[aluno.id][ativ.id] : '';
                    linha += `<td><input type="number" min="0" max="10" step="0.1" value="${notaValue}" oninput="atualizarNota('${aluno.id}', '${ativ.id}', this, ${indexAluno})"></td>`;
                });
                
                linha += `
                    <td id="media_${indexAluno}" style="font-weight: bold; font-size: 16px;">0.0%</td>
                    <td id="status_${indexAluno}">-</td>
                    <td class="esconder-no-pdf">
                        <button class="btn-icon" title="Ver Boletim" onclick="abrirBoletim('${aluno.id}')" style="color: #17a2b8; margin-right: 15px;">📊</button>
                        <button class="btn-icon" title="Excluir Aluno" onclick="excluirAluno(${indexAluno})">🗑️</button>
                    </td>
                </tr>`;
                
                tbody.innerHTML += linha;
                recalcularLinhaAluno(indexAluno, aluno.id); 
            });
        }

        // --- 2. SALVAMENTO CIRÚRGICO DE NOTAS ---
        window.timersNotas = window.timersNotas || {};

        window.atualizarNota = (alunoId, idAtividade, elementoInput, indexAluno) => {
            const turma = turmas[indiceTurmaAtiva];
            const area = turma.areas[areaAtiva];
            const valor = elementoInput.value;
            
            if(!area.notas[alunoId]) {
                area.notas[alunoId] = {};
            }
            
            area.notas[alunoId][idAtividade] = valor;
            elementoInput.setAttribute('value', valor);
            
            recalcularLinhaAluno(indexAluno, alunoId);
            
            const statusVisual = document.getElementById('statusNuvem');
            statusVisual.innerText = "⏳ Salvando Nota...";
            statusVisual.className = "status-salvando esconder-no-pdf";

            const timerKey = `nota_${alunoId}_${idAtividade}`;
            clearTimeout(window.timersNotas[timerKey]);

            window.timersNotas[timerKey] = setTimeout(async () => {
                try {
                    const idParaSalvar = turma.firebaseId || turma.nome;
                    const caminhoDaNota = `areas.${areaAtiva}.notas.${alunoId}.${idAtividade}`;
                    
                    const pacoteCirurgico = {
                        [caminhoDaNota]: valor,
                        "dataUltimaAtualizacao": new Date().toLocaleString('pt-BR')
                    };

                    await updateDoc(doc(db, "diarios_turmas", idParaSalvar), pacoteCirurgico);

                    statusVisual.innerText = "☁️ Salvo";
                    statusVisual.className = "status-salvo esconder-no-pdf";
                } catch(e) {
                    console.error("Erro ao salvar nota isolada:", e);
                    statusVisual.innerText = "❌ Erro";
                    statusVisual.className = "status-salvando esconder-no-pdf";
                }
            }, 800);
        };

        function recalcularLinhaAluno(indexAluno, alunoId) {
            const area = turmas[indiceTurmaAtiva].areas[areaAtiva];
            let totalPorcentagem = 0;

            area.atividades.forEach(ativ => {
                let nota = area.notas[alunoId] && area.notas[alunoId][ativ.id] ? parseFloat(area.notas[alunoId][ativ.id]) : 0;
                totalPorcentagem += (nota * (ativ.peso / 10));
            });

            const tdMedia = document.getElementById(`media_${indexAluno}`);
            const tdStatus = document.getElementById(`status_${indexAluno}`);
            if(!tdMedia) return; 

            tdMedia.innerText = totalPorcentagem.toFixed(1) + "%";
            if (totalPorcentagem >= 60) tdStatus.innerHTML = '<span class="status-badge approved">Aprovado</span>';
            else if (totalPorcentagem > 0) tdStatus.innerHTML = '<span class="status-badge reproved">Reprovado</span>';
            else tdStatus.innerHTML = '<span style="color: #999;">Aguardando</span>';
        }

        // --- SISTEMA DO BOLETIM (SEM A COLUNA SITUAÇÃO) ---
        window.abrirBoletim = (alunoId) => {
            const turma = turmas[indiceTurmaAtiva];
            const aluno = turma.alunos.find(a => a.id === alunoId);
            if(!aluno) return;

            alunoAtualBoletim = aluno.nome; 

            let htmlBoletim = `
                <div class="boletim-header">
                    <h2 style="color: #0056b3; margin: 0; font-size: 26px;">Boletim de Desempenho - SESI</h2>
                    <p style="margin: 8px 0; color: #333; font-size: 18px;"><strong>Aluno(a):</strong> ${aluno.nome}</p>
                    <p style="margin: 5px 0; color: #555; font-size: 16px;"><strong>Turma:</strong> ${turma.nome}</p>
                </div>
                <table class="boletim-table">
                    <thead>
                        <tr>
                            <th>Área da Disciplina</th>
                            <th style="text-align: center; width: 150px;">Média Final</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            // Percorre apenas as disciplinas que foram criadas na turma atual
            Object.keys(turma.areas).forEach(areaNome => {
                const areaDados = turma.areas[areaNome];
                let totalPorcentagem = 0;
                let temAtividades = areaDados.atividades.length > 0;

                if (temAtividades) {
                    areaDados.atividades.forEach(ativ => {
                        let nota = areaDados.notas[aluno.id] && areaDados.notas[aluno.id][ativ.id] ? parseFloat(areaDados.notas[aluno.id][ativ.id]) : 0;
                        totalPorcentagem += (nota * (ativ.peso / 10));
                    });
                }

                let mediaHTML = "-";

                if (temAtividades) {
                    mediaHTML = totalPorcentagem.toFixed(1) + "%";
                } else {
                    mediaHTML = '<span style="color: #aaa; font-style: italic;">S/N</span>';
                }

                htmlBoletim += `
                    <tr>
                        <td><strong>${areaNome}</strong></td>
                        <td style="text-align: center; font-size: 16px;">${mediaHTML}</td>
                    </tr>
                `;
            });

            htmlBoletim += `</tbody></table>`;
            
            document.getElementById('areaImpressaoBoletim').innerHTML = htmlBoletim;
            document.getElementById('modalBoletim').classList.remove('hidden');
        };

        window.fecharBoletim = () => {
            document.getElementById('modalBoletim').classList.add('hidden');
        };

        window.gerarPDFBoletim = () => {
            const btnBaixar = document.getElementById('btnBaixarBoletim');
            const textoOriginal = btnBaixar.innerText;
            btnBaixar.innerText = "⏳ Gerando PDF...";

            const htmlPronto = document.getElementById('areaImpressaoBoletim').innerHTML;
            const containerSecreto = document.getElementById('containerBoletimPDF');
            containerSecreto.innerHTML = htmlPronto;

            document.getElementById('conteudoPrincipal').classList.add('hidden');
            document.getElementById('modalBoletim').classList.add('hidden');
            containerSecreto.classList.remove('hidden');

            const opcoesPDF = {
                margin: 15,
                filename: `Boletim_SESI_${alunoAtualBoletim.replace(/\s+/g, '_')}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true }, 
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opcoesPDF).from(containerSecreto).save().then(() => {
                containerSecreto.classList.add('hidden');
                document.getElementById('conteudoPrincipal').classList.remove('hidden');
                document.getElementById('modalBoletim').classList.remove('hidden');
                containerSecreto.innerHTML = '';
                btnBaixar.innerText = textoOriginal;
            });
        };

        window.gerarPDFDiario = () => {
            const turma = turmas[indiceTurmaAtiva];
            if (!turma || turma.alunos.length === 0) { alert("Não há dados para gerar o PDF."); return; }
            document.body.classList.add('modo-impressao');
            const elementoParaPDF = document.getElementById('areaTurma');
            const opcoesPDF = {
                margin: 10,
                filename: `Diario_SESI_${turma.nome.replace(/\s+/g, '_')}_${areaAtiva.replace(/\s+/g, '_')}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
            };
            html2pdf().set(opcoesPDF).from(elementoParaPDF).save().then(() => document.body.classList.remove('modo-impressao'));
        };
    </script>
</body>
</html>
